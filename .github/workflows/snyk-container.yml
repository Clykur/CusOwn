# Snyk Container scan when a root Dockerfile exists. Requires SNYK_TOKEN.
#
# https://docs.snyk.io/products/snyk-container

name: Snyk Container

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '27 1 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  snyk:
    if: ${{ secrets.SNYK_TOKEN != '' && hashFiles('Dockerfile') != '' }}
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t cusown:snyk .

      - uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk Container test (SARIF)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          snyk container test cusown:snyk --file=Dockerfile --sarif-file-output=snyk.sarif --severity-threshold=high
          code=$?
          if [ ! -s snyk.sarif ]; then
            printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk Container","informationUri":"https://snyk.io"}},"results":[]}]}' > snyk.sarif
          fi
          exit "$code"

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

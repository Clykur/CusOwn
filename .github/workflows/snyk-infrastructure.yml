# Snyk Infrastructure as Code — scans `.github/` (workflows, composite actions).
# Requires SNYK_TOKEN. Uploads SARIF to Code Scanning; scan errors do not fail the job
# (findings still appear in SARIF / Security tab when Snyk produces output).
#
# https://docs.snyk.io/products/snyk-infrastructure-as-code

name: Snyk Infrastructure as Code

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '44 9 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  snyk:
    if: ${{ secrets.SNYK_TOKEN != '' }}
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk IaC test — SARIF
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk iac test .github --sarif-file-output=snyk.sarif || true
          if [ ! -s snyk.sarif ]; then
            printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk IaC","informationUri":"https://snyk.io"}},"results":[]}]}' > snyk.sarif
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                    ENTERPRISE CI/CD PIPELINE v2.0                            ║
# ║                                                                              ║
# ║  Architecture: Layered job graph with proper caching                         ║
# ║  Security: DevSecOps with SLSA Level 2 attestation                           ║
# ║                                                                              ║
# ║  Layer 1: Setup & Change Detection                                           ║
# ║  Layer 2: Static Analysis (lint, typecheck) - parallel                       ║
# ║  Layer 3: Security Scans (audit, license, secrets, custom) - parallel        ║
# ║  Layer 4: Tests (unit, integration, security) - parallel                     ║
# ║  Layer 5: Build & Artifacts (strict build, SBOM)                             ║
# ║  Layer 6: Quality Gates (depcheck, ts-prune, lockfile, node version)         ║
# ║  Layer 7: Pre-deploy Gate (all validations must pass)                        ║
# ║  Layer 8: Deploy to Production (main branch only)                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'chore/**', 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deployment'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  NODE_VERSION: '22'
  NODE_OPTIONS: '--max-old-space-size=4096'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 1: SETUP
  # ═══════════════════════════════════════════════════════════════════════════════

  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate cache key
        id: cache-key
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -c1-16)
          echo "key=deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${LOCK_HASH}" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  env-validation:
    name: Env & Config Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - name: Ensure .env.test
        run: node scripts/infrastructure/ensure-env-test.js
      - name: Validate env structure (verify-env)
        run: npx dotenv-cli -e .env.test -- npx ts-node --project scripts/tsconfig.json scripts/verify-env.ts
      - name: Node version check
        run: node scripts/infrastructure/check-node-version.js

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 2: STATIC ANALYSIS (parallel)
  # ═══════════════════════════════════════════════════════════════════════════════

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: npm run lint:strict

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: npm run typecheck

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: npm run format:check

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 3: SECURITY SCANS (parallel)
  # ═══════════════════════════════════════════════════════════════════════════════

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: npm run security:audit
      - run: npm run security:deps

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: node scripts/infrastructure/run-license-check.js

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  security-custom:
    name: Security (Custom Rules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: node scripts/infrastructure/validate-security-and-quality.js
      - run: npm run security-check

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup]
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          config: |
            query-filters:
              - exclude:
                  problem.severity:
                    - recommendation
            paths-ignore:
              - node_modules
              - .next
              - .next-build
              - coverage
              - '**/*.test.ts'
              - '**/*.spec.ts'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
          upload: true
          output: sarif-results

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif
          path: sarif-results
          retention-days: 30

      - name: Fail on HIGH/CRITICAL findings
        run: |
          SARIF_DIR="sarif-results"
          FAILED=false
          if [ -d "$SARIF_DIR" ]; then
            for f in "$SARIF_DIR"/*.sarif; do
              [ -f "$f" ] || continue
              ERROR_COUNT=$(jq -r '[.runs[].results[]? | select(.level == "error")] | length' "$f" 2>/dev/null || echo 0)
              WARNING_COUNT=$(jq -r '[.runs[].results[]? | select(.level == "warning")] | length' "$f" 2>/dev/null || echo 0)
              if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
                echo "::error::CodeQL found ${ERROR_COUNT} critical security issues"
                FAILED=true
              fi
              if [ "${WARNING_COUNT:-0}" -gt 0 ]; then
                echo "::warning::CodeQL found ${WARNING_COUNT} high-severity issues"
                FAILED=true
              fi
              echo "## CodeQL Security" >> $GITHUB_STEP_SUMMARY
              echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Critical | ${ERROR_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
              echo "| High | ${WARNING_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
            done
          fi
          if [ "$FAILED" = true ]; then
            echo "::error::CodeQL found security issues. Fix before merging."
            exit 1
          fi
          echo "CodeQL analysis passed" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 4: TESTS (parallel)
  # ═══════════════════════════════════════════════════════════════════════════════

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, lint, typecheck, format-check]
    env:
      SALON_TOKEN_SECRET: test-secret # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - name: Create .env.test
        run: | # pragma: allowlist secret
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          EOF
      - name: Unit tests (ts-node)
        run: npm run test:unit
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'
      - name: Vitest unit tests (coverage enforced by thresholds)
        run: npx dotenv-cli -e .env.test -- npx vitest run --config vitest.unit.config.mts --coverage
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'
      - name: Coverage summary
        run: |
          echo "## Unit test coverage" >> $GITHUB_STEP_SUMMARY
          echo "Enforced by Vitest thresholds in \`vitest.unit.config.mts\` (statements/branches/functions/lines)." >> $GITHUB_STEP_SUMMARY
          if [ -d coverage ]; then
            echo "Coverage artifact uploaded below." >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-unit
          path: coverage
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - name: Create .env.test
        run: | # pragma: allowlist secret
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          EOF
      - run: npx dotenv-cli -e .env.test -- npx vitest run scripts/unit-database --config vitest.config.mts
      - run: npx dotenv-cli -e .env.test -- npm run test:database-migrations

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - name: Create .env.test
        run: | # pragma: allowlist secret
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          EOF
      - run: npm run test:phase4 || true
      - run: npm run test:phase5 || true
      - run: npm run test:phase6 || true
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

  crud-checks:
    name: CRUD & Data Layer
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          EOF
      - name: CRUD (repositories + migrations)
        run: npm run test:crud
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 5: BUILD & ARTIFACTS
  # ═══════════════════════════════════════════════════════════════════════════════

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ runner.os }}-
      - name: Production build (strict)
        run: npm run build:strict
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://example.com' }}
      - name: Bundle size check
        run: npm run quality:bundle-size
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: .next-build
          retention-days: 1

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.json
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 6: QUALITY GATES
  # ═══════════════════════════════════════════════════════════════════════════════

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: node scripts/infrastructure/run-quality-gate.js quality:depcheck
      - run: node scripts/infrastructure/run-quality-gate.js quality:ts-prune

  lockfile-check:
    name: Lockfile Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - run: npm ci
        if: hashFiles('node_modules/.package-lock.json') == ''
      - run: node scripts/infrastructure/check-lockfile.js

  node-version-check:
    name: Node Version Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/infrastructure/check-node-version.js

  # ═══════════════════════════════════════════════════════════════════════════════
  # DEPENDENCY REVIEW (PRs only)
  # ═══════════════════════════════════════════════════════════════════════════════

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 7: PRE-DEPLOY GATE
  # ═══════════════════════════════════════════════════════════════════════════════

  pre-deploy-gate:
    name: Pre-deploy Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      - lint
      - typecheck
      - format-check
      - env-validation
      - dependency-audit
      - license-check
      - secret-scan
      - security-custom
      - codeql
      - unit-tests
      - integration-tests
      - security-tests
      - crud-checks
      - build
      - quality-gates
      - lockfile-check
      - node-version-check
    steps:
      - name: All checks passed
        run: |
          echo "## ✅ Pre-deploy Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All required checks passed:" >> $GITHUB_STEP_SUMMARY
          echo "- Lint, Typecheck, Format" >> $GITHUB_STEP_SUMMARY
          echo "- Env & config validation" >> $GITHUB_STEP_SUMMARY
          echo "- Security (audit, license, secrets, custom, CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (unit, integration, security, CRUD)" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage (Vitest thresholds)" >> $GITHUB_STEP_SUMMARY
          echo "- Build, Quality gates" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════════
  # LAYER 8: DEPLOYMENT (Production only)
  # ═══════════════════════════════════════════════════════════════════════════════

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pre-deploy-gate]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.skip_deploy != 'true')
    environment:
      name: production
      url: https://cusown.clykur.com
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Vercel secrets
        id: vercel-check
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Vercel secrets not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: steps.vercel-check.outputs.skip != 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --force'
          scope: ${{ secrets.VERCEL_ORG_ID }}
          github-comment: true

      - name: Deployment audit
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY

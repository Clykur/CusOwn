# Snyk Code (SAST) + Open Source (SCA) for this repo. SARIF is uploaded to Code Scanning.
# Requires SNYK_TOKEN repository secret. Job is skipped when the secret is unset.
#
# https://docs.snyk.io/snyk-cli/cli-reference

name: Snyk Security

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  snyk:
    if: ${{ secrets.SNYK_TOKEN != '' }}
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk Code (SAST) — SARIF
        id: snyk_code
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          snyk code test --sarif-file-output=snyk-code.sarif --severity-threshold=high
          code=$?
          if [ ! -s snyk-code.sarif ]; then
            printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk Code","informationUri":"https://snyk.io"}},"results":[]}]}' > snyk-code.sarif
          fi
          exit "$code"

      - name: Snyk Open Source (SCA)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
